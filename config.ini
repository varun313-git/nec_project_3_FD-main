# Configuration File (Optional Customization)
# Modify these parameters to customize the system behavior

## Registration Configuration
[REGISTRATION]
# Number of images to capture per user during registration
images_to_capture = 30

# Minimum face size for detection (in pixels)
min_face_size = 30

# Maximum face size for detection (in pixels)
max_face_size = 300

# Face detection scale factor (1.1 = 10% increment)
face_cascade_scale_factor = 1.1

# Minimum neighbors for face detection quality
min_neighbors = 5


## Training Configuration
[TRAINING]
# Target image size for model input (width x height)
target_size = 64

# Number of training epochs
epochs = 20

# Batch size for training
batch_size = 8

# Test/validation data percentage (0.0 to 1.0)
test_split = 0.2

# Optimizer (adam, sgd, rmsprop)
optimizer = adam

# Loss function (categorical_crossentropy, sparse_categorical_crossentropy)
loss_function = categorical_crossentropy

# Dropout rate (0.0 to 1.0)
dropout_rate = 0.5

# Batch normalization enabled
batch_normalization = true


## Detection Configuration
[DETECTION]
# Confidence threshold for recognition (0-100%)
# Faces below this threshold will be marked as "Unknown"
confidence_threshold = 60

# Face detection scale factor
face_cascade_scale_factor = 1.1

# Minimum neighbors for detection quality
min_neighbors = 5

# Display FPS counter
display_fps = true

# Display confidence score
display_confidence = true


## CNN Architecture Configuration
[CNN_ARCHITECTURE]
# Convolutional layer 1 filters
conv1_filters = 32

# Convolutional layer 2 filters
conv2_filters = 64

# Convolutional layer 3 filters
conv3_filters = 128

# Dense layer units
dense_units = 128

# Activation function (relu, sigmoid, tanh)
activation = relu

# Pool size for max pooling
pool_size = 2


## Performance Configuration
[PERFORMANCE]
# Enable GPU acceleration (if available)
use_gpu = true

# Number of threads for data loading
num_threads = 4

# Image resize quality (0-100)
image_quality = 95


## Database Configuration
[DATABASE]
# Database file path
database_path = database/users.json

# Auto-backup database
auto_backup = true

# Backup interval (number of operations)
backup_interval = 10


## Display Configuration
[DISPLAY]
# Window width
window_width = 640

# Window height
window_height = 480

# Font size for text display
font_size = 1.0

# Line thickness for boxes
line_thickness = 3

# Text color (BGR format)
text_color_recognized = 0,255,0     # Green for recognized
text_color_unknown = 0,0,255         # Red for unknown
text_color_background = 0,255,0      # Green background

# Bounding box color (BGR format)
box_color_recognized = 0,255,0       # Green
box_color_unknown = 0,0,255          # Red


## Logging Configuration
[LOGGING]
# Enable logging
enable_logging = true

# Log file path
log_file = logs/system.log

# Log level (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

# Maximum log file size (MB)
max_log_size = 10


## Advanced Configuration
[ADVANCED]
# Enable face alignment
face_alignment = false

# Enable anti-spoofing
anti_spoofing = false

# Enable liveness detection
liveness_detection = false

# Data augmentation during training
data_augmentation = true

# Random seed for reproducibility
random_seed = 42

# TensorFlow verbosity (0, 1, 2)
tensorflow_verbosity = 1

# Show training history plot
show_training_plot = true

# Save model checkpoints during training
save_checkpoints = true

# Checkpoint save interval (epochs)
checkpoint_interval = 5

---

## Notes for Customization

1. **Images to Capture**: Increase for better accuracy (50-100 recommended)

2. **Confidence Threshold**: 
   - Higher (80%): More strict, fewer false positives
   - Lower (40%): More lenient, more false positives

3. **Batch Size**: 
   - Larger (16, 32): Faster training but more memory
   - Smaller (4, 8): Slower training but less memory

4. **Test Split**:
   - 0.2 = 80% training, 20% testing
   - Increase for more rigorous evaluation

5. **Model Filters**:
   - Increase for better feature extraction (more parameters)
   - Decrease for faster training (fewer parameters)

6. **Display Settings**: Adjust for your monitor resolution

7. **Logging**: Enable for debugging issues

8. **Advanced Features**: Require additional models/libraries

---

## How to Use This Configuration

### Option 1: Manual Modification
Edit the values above, then modify the Python files to use these parameters.

### Option 2: Create a Config Reader
```python
import configparser

config = configparser.ConfigParser()
config.read('config.ini')

images_to_capture = config.getint('REGISTRATION', 'images_to_capture')
confidence_threshold = config.getint('DETECTION', 'confidence_threshold')
```

### Option 3: Environment Variables
Set environment variables and use in Python:
```python
import os
threshold = int(os.getenv('CONFIDENCE_THRESHOLD', '60'))
```

